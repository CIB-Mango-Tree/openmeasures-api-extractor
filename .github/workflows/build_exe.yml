name: Build Executables

on:
  workflow_call:
    secrets:
      APPLE_DEV_EMAIL:
      APP_SPEC_PASS:
      DEV_APP_CERT:
      DEV_APP_CERT_PASS:
      DEV_INST_CERT:
      DEV_INST_CERT_PASS:
      APPLE_KEY_PASS:
      APPLE_APP_CERT_ID:
      APPLE_INST_CERT_ID:
      TEAM_ID:

    inputs:
      is_release:
        default: false
        description: "Is this a release?"
        type: boolean
        required: false
jobs:
  build:
    strategy:
      matrix:
        include:
          - platform_name: Windows
            artifact_name: windows
            os: windows-2022
            version_command: icacls "VERSION" /grant Everyone:F /T /C /Q
            move_command: move app\dist\mango-tree-api-extractor.exe app\dist\mango-tree-api-extractor-windows.exe
            sha_command: pwsh -c "Get-FileHash -Algorithm SHA1 app\dist\mango-tree-api-extractor-windows.exe | Format-Table Hash -HideTableHeaders > app\dist\mango-tree-api-extractor-windows.exe.sha1"
            list_command: dir app\dist
          - platform_name: MacOS (x86)
            artifact_name: macos-x86
            os: macos-15-intel
            move_command: mv app/dist/mango-tree-api-extractor app/dist/mango-tree-api-extractor-macos-x86
            sha_command: shasum -a 1 app/dist/mango-tree-api-extractor-macos-x86 > app/dist/mango-tree-api-extractor-macos-x86.sha1
            sha_command_pkg: shasum -a 1 dist/mango-tree-api-extractor-macos-x86.pkg > app/dist/mango-tree-api-extractor-macos-x86.pkg.sha1
            list_command: ls -ll app/dist
          - platform_name: MacOS (arm64)
            artifact_name: macos-arm64
            os: macos-15
            move_command: mv app/dist/mango-tree-api-extractor app/dist/mango-tree-api-extractor-macos-arm64
            sha_command: shasum -a 1 app/dist/mango-tree-api-extractor-macos-arm64 > app/dist/mango-tree-api-extractor-macos-arm64.sha1
            sha_command_pkg: shasum -a 1 app/dist/mango-tree-api-extractor-macos-arm64.pkg > app/dist/mango-tree-api-extractor-macos-arm64.pkg.sha1
            list_command: ls -ll app/dist

    name: Build ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version-file: "api/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.8"

      - name: Install Python Dependencies
        run: |
          cd api
          uv sync --locked --all-extras --dev
          cd ../

      - name: Setup Node.JS
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.20.x"
          run_install: false

      - name: Install Node.JS Dependencies
        run: |
          cd site
          pnpm install
          cd ../
          cd app
          pnpm install
          cd ../

      - name: Create macOS keychain
        id: keychain
        if: runner.os == 'macOS' && inputs.is_release
        env:
          APPLE_DEV_EMAIL: ${{secrets.APPLE_DEV_EMAIL}}
          APP_SPEC_PASS: ${{secrets.APP_SPEC_PASS}}
          APPLE_APP_CERTIFICATE: ${{secrets.DEV_APP_CERT}}
          APPLE_APP_CERT_PASSWORD: ${{secrets.DEV_APP_CERT_PASS}}
          APPLE_INST_CERTIFICATE: ${{secrets.DEV_INST_CERT}}
          APPLE_INST_CERT_PASSWORD: ${{secrets.DEV_INST_CERT_PASS}}
          APPLE_KEYCHAIN_PASS: ${{secrets.APPLE_KEY_PASS}}
        run: |
          echo "$APPLE_APP_CERTIFICATE" | base64 --decode > app_certificate.p12
          echo "$APPLE_INST_CERTIFICATE" | base64 --decode > inst_certificate.p12
          security create-keychain -p $APPLE_KEYCHAIN_PASS build.keychain
          security default-keychain -s build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p $APPLE_KEYCHAIN_PASS build.keychain
          security import app_certificate.p12 -k build.keychain -P $APPLE_APP_CERT_PASSWORD -A
          security import inst_certificate.p12 \
          -k build.keychain \
          -P "$APPLE_INST_CERT_PASSWORD" \
          -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k $APPLE_KEYCHAIN_PASS build.keychain
          security find-identity -v -p codesigning -p macappstore
      - name: Print version string (for tag)
        id: get_version_tag
        if: ${{ github.ref_type == 'tag' }}
        run: |
          python -c "with open('VERSION', 'w', encoding='utf-8') as f: f.write('${{ github.ref_name }}')"

      - name: Print version string (for branch)
        id: get_version_branch
        if: ${{ github.ref_type != 'tag' }}
        run: |
          python -c "with open('VERSION', 'w', encoding='utf-8') as f: f.write('${{ github.ref_name }}-${{ github.sha }}')"

      - name: Modify version string permission
        if: ${{ matrix.version_command }}
        run: ${{ matrix.version_command }}

      - name: Build the Backend Executable
        env:
          APPLE_APP_CERT_ID: "${{ inputs.is_release && secrets.APPLE_APP_CERT_ID || '' }}"
        run: |
          cd api
          uv run pyinstaller pyinstaller.spec
          cd ../

      - name: Build the Production Frontend Bundles
        env:
          APPLE_APP_CERT_ID: "${{ inputs.is_release && secrets.APPLE_APP_CERT_ID || '' }}"
        run: |
          cd site
          pnpm build
          cd ../

      - name: Build the App Executable
        env:
          APPLE_APP_CERT_ID: "${{ inputs.is_release && secrets.APPLE_APP_CERT_ID || '' }}"
        run: |
          cd app
          ./copy_assets.sh
          pnpm build
          pnpm compile
          cd ../

      - name: Rename the executable to include platform suffix
        run: ${{ matrix.move_command }}

      - name: Compute the SHA1 hashsum
        run: ${{ matrix.sha_command }}

      - name: Create and sign mac package
        if: runner.os == 'macOS' && inputs.is_release
        env:
          APPLE_INST_CERT_ID: ${{secrets.APPLE_INST_CERT_ID}}
          APPLE_KEYCHAIN_PASS: ${{secrets.APPLE_KEY_PASS}}
        run: |
          mkdir -p /tmp/cibmangotree/
          ditto app/dist/mango-tree-api-extractor-${{matrix.artifact_name}} /tmp/cibmangotree/mango-tree-api-extractor
          chmod +x /tmp/cibmangotree/mango-tree-api-extractor
          security unlock-keychain -p $APPLE_KEYCHAIN_PASS build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_KEYCHAIN_PASS" build.keychain
          security find-identity -v -p codesigning build.keychain
          pkgbuild --identifier "org.cibmangotree.api.extractor" --timestamp --root /tmp/cibmangotree --install-location /Applications "./app/dist/mango-tree-api-extractor-${{matrix.artifact_name}}-signed.pkg" --sign "$APPLE_INST_CERT_ID"

      - name: Notarize Mac package
        if: runner.os == 'macOS' && inputs.is_release
        env:
          APPLE_DEV_EMAIL: ${{secrets.APPLE_DEV_EMAIL}}
          APPLE_TEAM_ID: ${{secrets.TEAM_ID}}
          APP_SPEC_PASS: ${{secrets.APP_SPEC_PASS}}
        run: xcrun notarytool submit app/dist/mango-tree-api-extractor-${{matrix.artifact_name}}-signed.pkg --apple-id $APPLE_DEV_EMAIL --team-id $APPLE_TEAM_ID --password $APP_SPEC_PASS --wait

      - name: Staple the notarization ticket
        if: runner.os == 'macOS' && inputs.is_release
        run: xcrun stapler staple app/dist/mango-tree-api-extractor-${{matrix.artifact_name}}-signed.pkg

      - name: Clean up macOS Artifacts
        if: runner.os == 'macOS' && inputs.is_release
        run: |
          rm -rf /tmp/cibmangotree
          rm -rf app/dist/mango-tree-api-extractori-${{matrix.artifact_name}}
          rm -rf app/dist/mango-tree-api-extractor-${{matrix.artifact_name}}.pkg
          mv app/dist/mango-tree-api-extractor-${{matrix.artifact_name}}-signed.pkg app/dist/mango-tree-api-extractor-${{matrix.artifact_name}}.pkg

      - name: Compute the SHA1 hashsum for macOS .pkg
        if: runner.os == 'macOS' && inputs.is_release
        run: ${{ matrix.sha_command_pkg }}

      - name: Inspect the dist/ directory before uploading artifacts
        run: ${{ matrix.list_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: inputs.is_release
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            app/dist/*
